name: browser
on:
  workflow_dispatch:
    inputs:
      cmd_b64:
        description: 'Base64-encoded full browser-local command'
        required: true
        type: string
      session:
        description: 'Session name'
        default: 'default'
        type: string

concurrency:
  group: browser-session-${{ inputs.session }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Chromium + deps
        run: |
          # Install Chromium
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || \
          sudo apt-get install -y -qq chromium 2>/dev/null || true

          # Find Chrome/Chromium binary
          CHROME_BIN=$(which google-chrome google-chrome-stable chromium chromium-browser 2>/dev/null | head -1)
          if [ -z "$CHROME_BIN" ]; then
            # Try snap
            sudo snap install chromium 2>/dev/null || true
            CHROME_BIN=$(which chromium 2>/dev/null)
          fi

          if [ -n "$CHROME_BIN" ]; then
            echo "Found browser: $CHROME_BIN"
            # Ensure /usr/bin/chromium exists (browser-local expects this)
            if [ "$CHROME_BIN" != "/usr/bin/chromium" ]; then
              sudo ln -sf "$CHROME_BIN" /usr/bin/chromium
            fi
          else
            echo "ERROR: No Chrome/Chromium found"
            exit 1
          fi
          echo "CHROME=$CHROME_BIN" >> $GITHUB_ENV

      - name: Install Python deps
        run: pip install -q websocket-client

      - name: Restore profile cache
        id: cache-profile
        uses: actions/cache@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
          restore-keys: |
            browser-profile-${{ inputs.session }}
            browser-profile-default

      - name: Execute
        id: execute
        run: |
          chmod +x $GITHUB_WORKSPACE/browser-local
          CMD=$(echo "${{ inputs.cmd_b64 }}" | base64 -d 2>/dev/null || echo "${{ inputs.cmd_b64 }}")
          SESSION="${{ inputs.session }}"

          # Start browser in background with explicit port
          python3 $GITHUB_WORKSPACE/browser-local --session "$SESSION" start --port=9222 &
          START_PID=$!

          # Wait for CDP URL
          CDP_URL=""
          for i in $(seq 1 10); do
            if [ -f /tmp/browser-local.pid ]; then
              CDP_URL=$(python3 -c "import json; print(json.load(open('/tmp/browser-local.pid'))['cdp_url'])" 2>/dev/null)
              [ -n "$CDP_URL" ] && break
            fi
            # Fallback: check port directly
            CDP_URL=$(python3 -c "
import json, urllib.request
try:
    d = json.loads(urllib.request.urlopen('http://127.0.0.1:9222/json/version').read())
    print(d.get('webSocketDebuggerUrl',''))
except: print('')
" 2>/dev/null)
            [ -n "$CDP_URL" ] && break
            sleep 2
          done

          if [ -z "$CDP_URL" ]; then
            echo "ERROR: Could not start Chromium / find CDP port"
            pkill -f "remote-debugging" 2>/dev/null || true
            exit 1
          fi

          echo "CDP_URL=$CDP_URL"
          echo "CMD=$CMD"

          # Execute command
          python3 $GITHUB_WORKSPACE/browser-local --cdp-url "$CDP_URL" --session "$SESSION" $CMD 2>&1 || true

          # Kill browser gracefully
          kill $START_PID 2>/dev/null || true
          sleep 2
          pkill -f "remote-debugging" 2>/dev/null || true

      - name: Save profile cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ inputs.session }}
