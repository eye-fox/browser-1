name: browser
on:
  workflow_dispatch:
    inputs:
      cmd_b64:
        description: Base64-encoded browser-local command
        required: true
        type: string
      session:
        description: Session name
        default: default
        type: string

concurrency:
  group: browser-session-${{ github.event.inputs.session }}
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser 2>/dev/null || sudo apt-get install -y -qq chromium 2>/dev/null || true
          CHROME=$(which google-chrome google-chrome-stable chromium chromium-browser 2>/dev/null | head -1)
          if [ -z "$CHROME" ]; then sudo snap install chromium 2>/dev/null || true; CHROME=$(which chromium 2>/dev/null); fi
          if [ -n "$CHROME" ] && [ "$CHROME" != "/usr/bin/chromium" ]; then sudo ln -sf "$CHROME" /usr/bin/chromium; fi
          echo "BROWSER=$CHROME"

      - name: Install deps
        run: pip install -q websocket-client

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ github.event.inputs.session }}

      - name: Run command
        run: |
          chmod +x $GITHUB_WORKSPACE/browser-local
          CMD=$(echo "${{ github.event.inputs.cmd_b64 }}" | base64 -d)
          SES=${{ github.event.inputs.session }}

          # Start browser
          python3 $GITHUB_WORKSPACE/browser-local --session "$SES" start --port=9222 &
          SPID=$!

          # Wait for CDP
          for i in $(seq 1 15); do
            CDP=$(python3 -c "import json; f='/tmp/browser-local.pid'; print(json.load(open(f))['cdp_url'])" 2>/dev/null)
            [ -n "$CDP" ] && break
            CDP=$(python3 -c "import json,urllib.request; print(json.loads(urllib.request.urlopen('http://127.0.0.1:9222/json/version').read()).get('webSocketDebuggerUrl',''))" 2>/dev/null)
            [ -n "$CDP" ] && break
            sleep 2
          done

          if [ -z "$CDP" ]; then echo "FAIL: no CDP"; exit 1; fi
          python3 $GITHUB_WORKSPACE/browser-local --cdp-url "$CDP" --session "$SES" $CMD 2>&1 || true
          kill $SPID 2>/dev/null; pkill -f remote-debugging 2>/dev/null

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/browser-local-data
          key: browser-profile-${{ github.event.inputs.session }}
